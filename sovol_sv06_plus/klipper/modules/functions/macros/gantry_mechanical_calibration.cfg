###############################################################################
#  Source: https://github.com/strayr/strayr-k-macros
#  This file has been refactored and merged to improve safety and feedback.
# 
#  Mechanical Gantry Calibration (G34)
#  
#  Requires TMC2209 drivers with UART control. This process uses motor force
#  to physically align the Z-gantry to the top of the printer's frame. It
#  is analogous to Marlin's G34 functionality.
#
#  It works by moving the gantry to the top, reducing motor current, and then
#  driving the gantry into the physical frame stops. This forces the two sides
#  to align perfectly with the frame, removing any skew that has developed.
#
#  This is a powerful tool but can be dangerous if misconfigured. The stall
#  current must be set low enough to not damage the motors or frame.
#  
#            HERE BE DRAGONS!
#            YOU WERE WARNED!
#
###############################################################################

# The [force_move] section must be enabled for this macro to work.
# It only needs to be defined once in your entire Klipper configuration.
[force_move]
enable_force_move: true ; enable FORCE_MOVE and SET_KINEMATIC_POSITION

[gcode_macro MECHANICAL_GANTRY_CALIBRATE]
description: "Uses motor force to physically align the Z-gantry to the printer frame."
gcode:
    {% set STALL_CURRENT = params.CURRENT|default(0.20)|float %}
    {% set Z_MAX = printer.toolhead.axis_maximum.z %}
    
    M118 Mechanical Gantry Calibration starting...
    M118 DANGER: This process will stall the Z-motors.
    M118 Using a stall current of {STALL_CURRENT}A.

    # Store old current values
    {% set old_current_z = printer.configfile.settings["tmc2209 stepper_z"].run_current %}
    {% set old_hold_z = printer.configfile.settings["tmc2209 stepper_z"].hold_current %}
    
    _CG28 ; Conditional home if needed

    G90
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F18000 ; Center toolhead

    M118 Moving gantry to top...
    G0 Z{Z_MAX - 5} F{printer.configfile.settings.printer.max_z_velocity * 60}

    M118 Setting Z motor current to {STALL_CURRENT}A.
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={STALL_CURRENT}
    {% if "stepper_z1" in printer.configfile.settings %}
        SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={STALL_CURRENT}
    {% endif %}
    
    G4 P500 ; Wait for current to settle

    M118 Stalling gantry against top frame...
    SET_KINEMATIC_POSITION Z={Z_MAX - 10} ; Trick Klipper into thinking Z is 10mm lower
    G1 Z{Z_MAX} F{4 * 60}                 ; Drive Z up 10mm to stall against the top
    G4 P1000                              ; Wait 1 second for gantry to settle
    
    M118 Gantry aligned. Restoring state...
    G1 Z{Z_MAX - 6} F{4 * 60} ; Move down a bit
    
    ; Restore original motor currents
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={old_current_z} HOLDCURRENT={old_hold_z}
    {% if "stepper_z1" in printer.configfile.settings %}
        SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={old_current_z} HOLDCURRENT={old_hold_z}
    {% endif %}

    G4 P500 ; Wait for current to restore

    M118 Re-homing Z axis...
    G28 Z ; MUST re-home Z as the position is now wrong
    M118 Mechanical Gantry Calibration complete.

[gcode_macro G34]
description: "Alias for MECHANICAL_GANTRY_CALIBRATE."
gcode:
    MECHANICAL_GANTRY_CALIBRATE