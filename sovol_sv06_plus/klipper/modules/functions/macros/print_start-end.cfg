### Use START_PRINT and END_PRINT for the slicer starting and ending script - please customize for your slicer of choice
### This version has been improved for efficiency and to reduce oozing.

[gcode_macro PRINT_START]
description: Prepares the printer for a new print, with an adaptive mesh and purge line.
gcode:
    {% set bed_temp = params.BED_TEMP|default(params.BED|default(60))|float %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(params.EXTRUDER|default(params.HOTEND|default(190)))|float %}
    {% set extruder_standby = 150|float %}
    {% set area_start = params.AREA_START|default("0,0") %}
    {% set area_end = params.AREA_END|default("0,0") %}

    M118 Homing and pre-heating...
    M140 S{bed_temp}                      ; Set bed temp and continue
    M104 S{extruder_standby}              ; Set extruder to standby temp to prevent ooze

    G28                              ; Home all axes

    M118 Waiting for bed to reach {bed_temp}°C...
    M190 S{bed_temp}                      ; Wait for bed to reach temperature

    BED_MESH_CALIBRATE AREA_START={area_start} AREA_END={area_end}  ; Adaptive mesh for print area
    SKEW_PROFILE LOAD=CaliFlower     ; Load skew correction profile

    G28 Z                            ; Re-home Z after mesh

    SMART_PARK                       ; Park near print area for final heating
    M118 Heating extruder to final temperature {extruder_temp}°C...
    M109 S{extruder_temp}                 ; Wait for extruder to reach final printing temperature

    LINE_PURGE                       ; Adaptive purge line near print area

[gcode_macro PRINT_END]
description: Finishes the print and parks the toolhead.
gcode:
    # Get retraction length from globals, fallback to 4mm if not defined
    {% set retract_length = printer["gcode_macro _globals"].pre_purge_prime_length|default(4.0)|float %}

    M400                             ; Wait for all moves to finish
    
    ; Retract filament to prevent blobs
    M83                              ; Ensure relative extrusion
    G1 E-{retract_length} F3600
    G92 E0

    G91                              ; Use relative positioning for safe moves
    
    ; Get axis boundaries
    {% set max_z = printer.configfile.config.stepper_z.position_max|float %}
    
    ; Lift Z clear of the print
    {% set z_safe = 2.0 if printer.toolhead.position.z < (max_z - 2) else 0 %}
    G0 Z{z_safe} F3600
    
    G90                              ; Back to absolute positioning

    M118 Turning off heaters and fans.
    TURN_OFF_HEATERS
    M107                             ; Turn off part cooling fan
    
    M118 Presenting print...
    ; Move toolhead to front-left, pushing bed to the back
    G0 X5 Y{printer.configfile.config.stepper_y.position_max|float} F3600
    
    M84                              ; Disable all steppers
    
    SET_SKEW CLEAR=1                 ; Clear skew correction

########################################### END OF PRINT START/END ###########################################