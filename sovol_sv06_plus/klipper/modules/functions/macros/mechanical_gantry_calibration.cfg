[gcode_macro MECHANICAL_GANTRY_CALIBRATE]
description: "Uses motor force to physically align the Z-gantry to the printer frame."
gcode:
    {% set STALL_CURRENT = params.CURRENT|default(0.20)|float %}
    {% set Z_MAX = printer.toolhead.axis_maximum.z %}
    
    M118 Mechanical Gantry Calibration starting...
    _CG28 ; Conditional home
    G90
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F18000
    G0 Z{Z_MAX - 5} F{printer.configfile.settings.printer.max_z_velocity * 60}
    
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={STALL_CURRENT}
    SET_KINEMATIC_POSITION Z={Z_MAX - 10}
    G1 Z{Z_MAX} F{4 * 60}
    G4 P1000
    G1 Z{Z_MAX - 6} F{4 * 60}
    
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings["tmc2209 stepper_z"].run_current}
    G28 Z
    M118 Gantry Calibration Complete.

[gcode_macro G34]
gcode:
    MECHANICAL_GANTRY_CALIBRATE
