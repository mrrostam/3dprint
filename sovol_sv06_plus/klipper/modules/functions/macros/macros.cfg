#####################################################################
#   Unified Master Macros for Sovol SV06 Plus
#####################################################################

[gcode_macro _globals]
variable_filament_sensor_enabled: 0
variable_beeping_enabled: 1
variable_kamp_enable: 1
variable_pre_purge_prime_length: 1.40
gcode:
    # Do not delete

[gcode_macro PRINT_START]
description: Prepares the printer for a new print.
gcode:
    # 1. Capture parameters
    {% set bed_temp = params.BED|default(60)|float %}
    {% set extruder_temp = params.HOTEND|default(200)|float %}
    {% set area_start = params.AREA_START|default("0,0") %}
    {% set area_end = params.AREA_END|default("0,0") %}
    {% set nozzle_diameter = params.NOZZLE|default(0.4)|float %}
    {% set pressure_advance = params.PA|default(printer.configfile.settings.extruder.pressure_advance)|float %}
    {% set extruder_standby = 150|float %}

    M118 Starting Print...
    { action_respond_info("PRINT_START parameters: " ~ params) }
    
    # 2. Set Pressure Advance
    SET_PRESSURE_ADVANCE ADVANCE={pressure_advance}
    M118 Pressure Advance set to: {pressure_advance}

    # 3. Start Heating
    M140 S{bed_temp}                         ; Start bed heating
    M104 S{extruder_standby}                 ; Heat nozzle to standby (no ooze)

    # 4. Home
    M118 Homing...
    G28                                      ; Home all axes

    # 5. Wait for Bed
    M118 Waiting for Bed: {bed_temp}C
    M190 S{bed_temp}                         ; Wait for bed to reach temp

    # 6. Adaptive Bed Mesh (KAMP)
    M118 Generating Adaptive Mesh...
    BED_MESH_CALIBRATE AREA_START="{area_start}" AREA_END="{area_end}"
    
    # 7. Skew Correction
    {% if printer.configfile.settings.skew_correction %}
        SKEW_PROFILE LOAD=CaliFlower
    {% endif %}

    # 8. Final Heating
    SMART_PARK                               ; KAMP: Park near print area
    M118 Heating Hotend: {extruder_temp}C
    M109 S{extruder_temp}                    ; Wait for hotend to reach final temp

    # 9. Purge and Go
    LINE_PURGE AREA_START="{area_start}" AREA_END="{area_end}" ; KAMP: Purge line near print area
    M118 Print Started!

[gcode_macro PRINT_END]
description: Safely ends the print and parks the toolhead.
gcode:
    {% set max_z = printer.configfile.config.stepper_z.position_max|float %}
    {% set pos_z = printer.toolhead.position.z|float %}
    {% set z_safe = [pos_z + 2.0, max_z]|min %}
    {% set retract_length = printer["gcode_macro _globals"].pre_purge_prime_length|default(4.0)|float %}

    M400                                     ; Wait for buffer to clear
    G92 E0                                   ; Zero the extruder
    G1 E-{retract_length} F3600              ; Retract filament
    
    G90                                      ; Absolute positioning
    G0 Z{z_safe} F3600                       ; Move Z up slightly
    
    TURN_OFF_HEATERS
    M107                                     ; Turn off fan
    
    M118 Presenting Print...
    G0 X5 Y{printer.configfile.config.stepper_y.position_max|float - 5} F6000 ; Move bed forward
    
    SET_SKEW CLEAR=1                         ; Clear skew correction
    M84                                      ; Disable steppers
    M118 Print Complete.

[gcode_macro M600]
description: Filament Change
gcode:
    PAUSE
    UNLOAD_FILAMENT

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set z = params.Z|default(10)|int %}
    {% if printer['pause_resume'].is_paused|int == 0 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}
        SAVE_GCODE_STATE NAME=PAUSE
        BASE_PAUSE
        G91
        G1 Z{z} F900
        G90
        G1 X5 Y5 F6000                       ; Park at front corner
        SAVE_GCODE_STATE NAME=PAUSEPARK
        M104 S0                              ; Cool down nozzle
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        M109 S{etemp|int}                    ; Heat back to original temp
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100
        G91
        G1 Z{zhop * -1} E2 F900              ; Return Z and prime
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60
        BASE_RESUME
    {% endif %}

[gcode_macro LOAD_FILAMENT]
gcode:
    M83                            ; set extruder to relative
    G1 E30 F300                    ; load
    G1 E15 F150                    ; prime nozzle with filament
    M82                            ; set extruder to absolute
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83                            ; set extruder to relative
    G1 E10 F300                    ; extrude a little to soften tip
    G1 E-40 F1800                  ; retract some, but not too much or it will jam
    M82                            ; set extruder to absolute

[gcode_macro MECHANICAL_GANTRY_CALIBRATE]
description: "Uses motor force to physically align the Z-gantry to the printer frame."
gcode:
    {% set STALL_CURRENT = params.CURRENT|default(0.20)|float %}
    {% set Z_MAX = printer.toolhead.axis_maximum.z %}
    
    M118 Mechanical Gantry Calibration starting...
    _CG28 ; Conditional home
    G90
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F18000
    G0 Z{Z_MAX - 5} F{printer.configfile.settings.printer.max_z_velocity * 60}
    
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={STALL_CURRENT}
    SET_KINEMATIC_POSITION Z={Z_MAX - 10}
    G1 Z{Z_MAX} F{4 * 60}
    G4 P1000
    G1 Z{Z_MAX - 6} F{4 * 60}
    
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={printer.configfile.settings["tmc2209 stepper_z"].run_current}
    G28 Z
    M118 Gantry Calibration Complete.

[gcode_macro G34]
gcode:
    MECHANICAL_GANTRY_CALIBRATE

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
