# This macro helps to manually level the gantry (X-axis) using the probe.
# It probes the left and right sides of the bed and provides instructions on
# how much to turn the right Z-axis knob to level the gantry.
#
# Original file: klipper/modules/functions/macros/z_tilt_via_probe.cfg
# Refactored for clarity, configurability, and maintainability.

[gcode_macro _Z_TILT_PROBE_CONFIG]
description: Configuration for the MANUAL_Z_TILT_CALIBRATE macro.
variable_bed_temp: 60       # Default bed temperature. Preheat to override.
variable_lift_height: 5     # Z lift height between probes.
variable_probe_samples: 5   # Number of samples for each probe.
variable_accuracy: 0        # Allowed difference in "minutes" before a correction is advised. 
                            # With accuracy=1, adjustments are suggested for tilt > ~0.067mm.
                            # A value of 0 would require a tilt of < ~0.033mm to be considered level.
gcode:
    # This section is required for the macro to be registered.
    M118 _Z_TILT_PROBE_CONFIG loaded

[gcode_macro _CHECK_TILT_RESULT]
description: Internal macro to check probe results and provide adjustment feedback.
gcode:
    {% set config = printer['gcode_macro _Z_TILT_PROBE_CONFIG'] %}
    {% set lift_height = config.lift_height|float %}
    {% set accuracy = config.accuracy|int %}

    {% set z1 = params.LEFT_Z|float %} # Get from parameter
    {% set z2 = printer.probe.last_z_result|float %}

    # The conversion factor '30' is likely tuned for the specific printer's 
    # lead screws to translate the millimeter difference into "minutes" on a clock face
    # for manual adjustment. 1 minute of knob turn (6 degrees) corresponds to a specific
    # Z change that depends on the lead screw pitch.
    # diff = (z_difference_mm) * (minutes_per_mm)
    {% set diff  = ((z1 - z2) * 30)|int %}

    M118 Left Z: {z1|round(4)}, Right Z: {z2|round(4)}, Difference: {(z1-z2)|round(4)}mm
    
    G1 Z{lift_height} F3000

    {% if diff < (accuracy * -1) %}
      M84 Z
      RESPOND TYPE=error MSG="Gantry is tilted. Turn right knob CLOCKWISE about { diff * -1 } minutes."
    {% elif diff > accuracy %}
      M84 Z
      RESPOND TYPE=error MSG="Gantry is tilted. Turn right knob COUNTER-CLOCKWISE about { diff } minutes."
    {% else %}
      M140 S0
      RESPOND TYPE=command MSG="Gantry is level! ({z1|round(3)} vs {z2|round(3)})"
      
      # Move to a central parking position
      {% set x_min = printer.configfile.config.stepper_x.position_min|default(0)|float %}
      {% set x_max = printer.configfile.config.stepper_x.position_max|default(300)|float %}
      {% set y_min = printer.configfile.config.stepper_y.position_min|default(0)|float %}
      {% set y_max = printer.configfile.config.stepper_y.position_max|default(300)|float %}

      # These magic numbers are likely specific to the printer model (e.g., Sovol SV06 Plus)
      # to position the nozzle at a convenient spot after leveling.
      {% set park_y = (y_min + y_max) / 2 + 18.5 %}
      {% set park_x = (x_min + x_max) / 2 - 25 %}
      
      G1 X{park_x} Y{park_y} F10000
    {% endif %}

[gcode_macro MANUAL_Z_TILT_CALIBRATE]
description: Probes the bed at two points to guide manual leveling of the gantry.
gcode:
    {% set config = printer['gcode_macro _Z_TILT_PROBE_CONFIG'] %}
    {% set lift_height = config.lift_height|float %}
    {% set probe_samples = config.probe_samples|int %}
    {% set bed_temp = config.bed_temp|int if printer.heater_bed.target < 10 else printer.heater_bed.target|int %}

    {% if (printer.heater_bed.temperature < bed_temp - 1) or (printer.heater_bed.temperature > bed_temp + 4) %}
        RESPOND MSG="Preparing for z-probing: heating bed to {bed_temp}°C"
        M140 S{bed_temp + 3}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 1} MAXIMUM={bed_temp + 4}
        M140 S{bed_temp}
    {% endif %}
  
    {% if printer.toolhead.homed_axes|lower == "xy" %}
        G28 Z
    {% elif printer.toolhead.homed_axes|lower != "xyz" %}  
        G28
    {% endif %}

    # Define probe points. These values may be specific to the printer model.
    {% set x_min = printer.configfile.config.stepper_x.position_min|default(0)|float %}
    {% set x_max = printer.configfile.config.stepper_x.position_max|default(300)|float %}
    {% set y_min = printer.configfile.config.stepper_y.position_min|default(0)|float %}
    {% set y_max = printer.configfile.config.stepper_y.position_max|default(300)|float %}

    # These magic numbers are likely specific to the printer model (e.g., Sovol SV06 Plus)
    # probe_y is the Y-coordinate for both probing points.
    # probe_x_right is the X-coordinate for the right probing point.
    {% set probe_y = (y_min + y_max) / 2 + 18.5 %}
    {% set probe_x_left = x_min %}
    {% set probe_x_right = x_max - 47 %}

    G90
    G1 Z{lift_height} F3000

    # Probe left side
    RESPOND MSG="Probing left side..."
    G1 X{probe_x_left} Y{probe_y} F10000
    PROBE SAMPLES={probe_samples}
    {% set left_z_result = printer.probe.last_z_result %}

    G1 Z{lift_height} F3000

    # Probe right side
    RESPOND MSG="Probing right side..."
    G1 X{probe_x_right} Y{probe_y} F10000
    PROBE SAMPLES={probe_samples}

    # Check results and provide feedback
    _CHECK_TILT_RESULT LEFT_Z={left_z_result}

###########################################  END OF Z-TILT VIA PROBE ####################################