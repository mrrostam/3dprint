# This macro helps to manually level the gantry (X-axis) using the probe.
# It probes the left and right sides of the bed and provides instructions on
# how much to turn the right Z-axis knob to level the gantry.

[gcode_macro _Z_TILT_PROBE_CONFIG]
description: Configuration for the MANUAL_Z_TILT_CALIBRATE macro.
variable_bed_temp: 60       # Default bed temperature. Preheat to override.
variable_lift_height: 10    # Z lift height between probes.
variable_probe_samples: 3   # Number of samples for each probe.
variable_accuracy: 2        # Allowed difference in "minutes" (approx 0.13mm). 
                            # 0 is perfect, 2-3 is acceptable.
variable_z_rotation_dist: 4 # Your printer's Z rotation_distance (usually 4mm for SV06 Plus)
gcode:
    M118 _Z_TILT_PROBE_CONFIG loaded

[gcode_macro MANUAL_Z_TILT_CALIBRATE]
description: Probes the bed at two points to guide manual leveling of the gantry.
gcode:
    {% set config = printer['gcode_macro _Z_TILT_PROBE_CONFIG'] %}
    {% set lift_height = config.lift_height|float %}
    {% set probe_samples = config.probe_samples|int %}
    {% set bed_temp = config.bed_temp|int if printer.heater_bed.target < 10 else printer.heater_bed.target|int %}

    # Heat Bed
    {% if (printer.heater_bed.temperature < bed_temp - 1) or (printer.heater_bed.temperature > bed_temp + 4) %}
        RESPOND MSG="Heating bed to {bed_temp}C..."
        M140 S{bed_temp + 3}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 1} MAXIMUM={bed_temp + 4}
        M140 S{bed_temp}
    {% endif %}
  
    # Home if needed
    {% if "xyz" not in printer.toolhead.homed_axes %}  
        G28
    {% endif %}

    # Define Coordinates
    {% set x_min = printer.configfile.config.stepper_x.position_min|default(0)|float %}
    {% set x_max = printer.configfile.config.stepper_x.position_max|default(300)|float %}
    {% set y_min = printer.configfile.config.stepper_y.position_min|default(0)|float %}
    {% set y_max = printer.configfile.config.stepper_y.position_max|default(300)|float %}
    
    # Probing points: Center Y, Left X, Right X
    {% set probe_y = (y_min + y_max) / 2 %}
    {% set probe_x_left = x_min + 30 %} 
    {% set probe_x_right = x_max - 30 %}

    # 1. Probe Left
    G90
    G1 Z{lift_height} F3000
    RESPOND MSG="Probing Left Side..."
    G1 X{probe_x_left} Y{probe_y} F10000
    PROBE SAMPLES={probe_samples}
    
    # 2. Store Result & Move to Step 2
    # We pass the X coordinate for the right side to the next macro
    _MANUAL_Z_TILT_STEP_2 RIGHT_X={probe_x_right} PROBE_Y={probe_y}

[gcode_macro _MANUAL_Z_TILT_STEP_2]
description: Internal step 2: Store left Z, probe right Z.
gcode:
    {% set right_x = params.RIGHT_X|float %}
    {% set probe_y = params.PROBE_Y|float %}
    
    # Capture the FRESH result from Step 1
    {% set left_z = printer.probe.last_z_result %}
    SET_GCODE_VARIABLE MACRO=_CHECK_TILT_RESULT VARIABLE=left_z_val VALUE={left_z}
    
    {% set config = printer['gcode_macro _Z_TILT_PROBE_CONFIG'] %}
    {% set lift_height = config.lift_height|float %}
    {% set probe_samples = config.probe_samples|int %}

    # 3. Probe Right
    G1 Z{lift_height} F3000
    RESPOND MSG="Probing Right Side..."
    G1 X{right_x} Y{probe_y} F10000
    PROBE SAMPLES={probe_samples}
    
    # 4. Final Calculation
    _CHECK_TILT_RESULT

[gcode_macro _CHECK_TILT_RESULT]
description: Internal macro to check probe results and provide adjustment feedback.
variable_left_z_val: 0
gcode:
    {% set config = printer['gcode_macro _Z_TILT_PROBE_CONFIG'] %}
    {% set lift_height = config.lift_height|float %}
    {% set accuracy = config.accuracy|int %}
    {% set rotation_dist = config.z_rotation_dist|float %}

    {% set z_left = left_z_val|float %}
    {% set z_right = printer.probe.last_z_result|float %}
    
    # Calculate difference
    {% set diff_mm = z_left - z_right %}
    
    # Calculate "minutes" to turn
    # Formula: (diff_mm / rotation_dist) * 60
    # Example: (1mm / 4mm) * 60 = 15 minutes
    {% set minutes = (diff_mm / rotation_dist * 60)|int %}

    M118 Left Z: {z_left|round(4)} | Right Z: {z_right|round(4)} | Diff: {diff_mm|round(4)}mm
    
    G1 Z{lift_height} F3000

    {% if minutes|abs > accuracy %}
        M84 Z # Disable Z motors so user can turn knobs
        
        {% if minutes < 0 %}
            # Left is lower than Right (z_left < z_right) -> Diff is negative
            # We need to LOWER the right side (Clockwise)
            RESPOND TYPE=error MSG="TILT DETECTED! Turn RIGHT knob CLOCKWISE (CW) by {minutes|abs} minutes."
        {% else %}
            # Left is higher than Right (z_left > z_right) -> Diff is positive
            # We need to RAISE the right side (Counter-Clockwise)
            RESPOND TYPE=error MSG="TILT DETECTED! Turn RIGHT knob COUNTER-CLOCKWISE (CCW) by {minutes} minutes."
        {% endif %}
        
        RESPOND MSG="After adjusting, run MANUAL_Z_TILT_CALIBRATE again."
        
    {% else %}
        RESPOND TYPE=command MSG="Gantry is level! (Difference: {diff_mm|round(3)}mm)"
        # Park Center
        {% set x_max = printer.configfile.config.stepper_x.position_max|default(300)|float %}
        {% set y_max = printer.configfile.config.stepper_y.position_max|default(300)|float %}
        G1 X{x_max / 2} Y{y_max / 2} F10000
    {% endif %}
