[gcode_macro PID_TEST_BED]
description: Runs PID calibration for the heated bed.
gcode:
    # Parameters
    {% set TARGET_TEMP = params.TEMP|default(70)|int %}
    {% set _FROM_ALL = params._FROM_ALL|default(0)|int %}

    M118 Starting PID calibration for bed at {TARGET_TEMP}°C.
    _CG28 ; Conditional homing
    G90
    G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z40 F6000

    PID_CALIBRATE HEATER=heater_bed TARGET={TARGET_TEMP}
    
    M118 PID tuning for bed complete.
    {% if not _FROM_ALL %}
      M140 S0 ; Turn off bed heater
      RESPOND TYPE=command MSG="Run SAVE_CONFIG to store results."
    {% endif %}

[gcode_macro PID_TEST_HOTEND]
description: Runs PID calibration for the hotend.
gcode:
    # Parameters
    {% set TARGET_TEMP = params.TEMP|default(245)|int %}
    {% set FAN_SPEED = params.FAN_SPEED|default(128)|int %}
    {% set _FROM_ALL = params._FROM_ALL|default(0)|int %}

    M118 Starting PID calibration for hotend at {TARGET_TEMP}°C with fan at { (FAN_SPEED / 255 * 100)|round|int }%.
    _CG28 ; Conditional homing
    G90
    G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z10 F6000
    
    M106 S{FAN_SPEED}
    PID_CALIBRATE HEATER=extruder TARGET={TARGET_TEMP}
    M107 ; Turn off part cooling fan
    
    M118 PID tuning for hotend complete.
    {% if not _FROM_ALL %}
      M104 S0 ; Turn off hotend heater
      RESPOND TYPE=command MSG="Run SAVE_CONFIG to store results."
    {% endif %}

[gcode_macro PID_TEST_ALL]
description: Runs PID calibration for both bed and hotend, then saves configuration.
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(70)|int %}
    {% set HOTEND_TEMP = params.HOTEND_TEMP|default(245)|int %}
    
    M118 Starting full PID calibration sequence...
    
    PID_TEST_BED TEMP={BED_TEMP} _FROM_ALL=1
    PID_TEST_HOTEND TEMP={HOTEND_TEMP} _FROM_ALL=1
    
    TURN_OFF_HEATERS ; Turn off both heaters
    M118 All PID tuning complete. Saving configuration...
    SAVE_CONFIG
    M118 Configuration saved. Heaters are off.

[gcode_macro DO_PROBE_CALIBRATE]
description: Heats bed and nozzle to typical printing temps before starting the PROBE_CALIBRATE wizard.
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(55)|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(180)|int %}

    M118 Heating to {BED_TEMP}°C (bed) and {EXTRUDER_TEMP}°C (nozzle) for probe calibration.
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}
    
    M118 Waiting for bed to reach temperature...
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP}
    M118 Waiting for nozzle to reach temperature...
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}
    
    _CG28 ; Conditional Home

    M118 Ready to begin. Starting probe calibration wizard...
    PROBE_CALIBRATE